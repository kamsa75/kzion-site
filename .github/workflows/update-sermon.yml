name: 최근 설교 갱신

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-sermon
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 최신 설교 조회 및 sermon.json 갱신
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node .github/scripts/update-sermon.mjs
      - name: 변경 시 커밋 & 푸시
        run: |
          if ! git diff --quiet -- sermon.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sermon.json
            git commit -m "chore: 최근 설교 자동 갱신 [skip ci]"
            git push
          else
            echo "sermon.json 변경 없음"
          fi
